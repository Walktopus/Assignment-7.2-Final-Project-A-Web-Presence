<!--File type-->
<!DOCTYPE html>
<!--Webpage language-->
<html lang="en">
    <!--Webpage imports and baseline settings-->
<head>
<!--Character set-->
    <meta charset="UTF-8">
    <!--viewport scale-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--CSS import-->
     <link href = "table.css" rel = "stylesheet" type = "text/css"/>
     <!--Javascript import-->
    <script src = "Table_actions.js"></script>
    <!--Webpage title-->
    <title>Tables</title>
</head>
<!--Primary content container-->
<body>
            <!--This is the navagation section-->
    <nav>
        <a href="HomePage.html">HomePage</a>
    </nav>
    <!--Table of planets-->
    <table id="Planetlog">
        <!--Table Headers-->
        <thead>
            <th id="th1">Planet</th>
            <th id="th2">Gravity</th>
            <th id="th3">Atmospheric pressure</th>
            <th id="th4">Mass</th>
        </thead>
        <!--table main body-->
        <tbody>
        <!--Earth-->
    <tr id="tr1">
        <td>Earth</td>
        <td>9.8m/s<sup>2</sup></td>
        <td>14.7psi</td>
        <td>5.9722X10<sup>24</sup></td>
    </tr>
        <!--Mars-->
    <tr id="tr2">
        <td>Mars</td>
        <td>3.7sm/s<sup>2</sup></td>
        <td>0.088psi</td>
        <td>5.9722X10<sup>24</sup>kg</td>
    </tr>
    <!--Venus-->
    <tr id="tr3">
        <td>Venus</td>
        <td>8.87m/s<sup>2</sup></td>
        <td>1.45X10<sup>-13</sup></td>
        <td>4.86732X10<sup>24</sup>kg</td>
    </tr>
    <!--Mercury-->
    <tr id="tr4">
        <td>Mercury</td>
        <td>3.7m/s<sup>2</sup></td>
        <td>2x10<sup>-9</sup> millibar</td>
        <td>5.9722X10<sup>24</sup></td>
    </tr>
        </tbody>
    </table>
<!--Planet inputs-->
    <form id = "PlanetRow" onsubmit = "return false">
           Planet: <input type = "text" id = "Planet"/>
        Gravity: <input type = "text" id = "Grav"/>
        Atmospheric Pressure: <input type = "text" id = "Pressure"/>
        Mass: <input type = "text" id = "mass"/>
        <button id = "rowBTN" type = "submit" onclick = "NewPlanet()">Add a new planet</button>
        </form>
</body>
</html>
